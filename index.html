<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/R-logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reNove | Recovery Journey</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#6b4c7a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="reNove" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script>
    window._installPromptEvent = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window._installPromptEvent = e;
    });

    (function () {
      try {
        const theme = JSON.parse(localStorage.getItem('renove-theme'))?.state?.theme;
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
